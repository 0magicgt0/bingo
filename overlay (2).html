<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaloyCSer BINGO Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;800;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ui-scale:1.18;
  --accent-rgb:16,179,125;
  --accent:#10b37d;
  --accent-soft:rgba(16,179,125,.35);
  --accent-strong:rgba(16,179,125,.95);
  --accent-deep:#0b7d58;
  --bingo-font:'Montserrat',sans-serif;
}
html,body{background:transparent !important;width:100vw;height:100vh;overflow:hidden}
body{position:relative}

.bar{display:none !important}

.bar{
  position:fixed;
  left:28px;
  top:28px;
  z-index:5;
  transform:scale(var(--ui-scale));
  transform-origin:top left;
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:transparent;
  border:none;
  border-radius:0;
  padding:0;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  box-shadow:none;
  margin:0;
}
.bar-logo-img{
  width:42px;
  height:42px;
  object-fit:contain;
  flex-shrink:0;
  filter:drop-shadow(0 0 5px rgba(60,140,255,0.4));
}
.bar-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:24px;
  letter-spacing:2.2px;
  color:#c8e0ff;
  line-height:1;
}
.bar-text span{color:#4fa8ff}
.bar-text em{
  color:var(--accent);
  font-style:normal;
  text-shadow:0 0 10px rgba(var(--accent-rgb),.35);
}
.divider{width:2px;height:22px;background:rgba(70,140,255,0.16);margin:0 1px}
.pill{
  display:flex;align-items:center;gap:6px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  color:rgba(160,200,255,0.55);
}
.pill b{color:#c8e0ff}
.dot{width:7px;height:7px;border-radius:50%}
.dot-r{background:#4fa8ff;box-shadow:0 0 4px #4fa8ff}
.dot-g{
  background:var(--accent);
  box-shadow:0 0 8px rgba(var(--accent-rgb),.95);
}


.notif{
  position:fixed;
  left:50%;
  top:50%;
  width:min(560px,92vw);
  padding:0;
  background:linear-gradient(180deg,rgba(7,11,26,.96),rgba(10,16,36,.94));
  border:1px solid rgba(79,168,255,.16);
  border-radius:30px;
  overflow:hidden;
  opacity:0;
  pointer-events:none;
  transform:translate(-50%,-50%) scale(.84) translateY(18px);
  transition:opacity .2s ease,transform .34s cubic-bezier(.2,.8,.2,1);
  box-shadow:
    0 24px 70px rgba(0,10,30,.42),
    0 0 0 1px rgba(255,255,255,.02) inset,
    0 0 48px rgba(79,168,255,.08);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.notif::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top,rgba(79,168,255,.1),transparent 44%),
    linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0) 42%);
  pointer-events:none;
}
.notif::after{
  content:'';
  position:absolute;
  left:22px;
  right:22px;
  bottom:-20px;
  height:44px;
  border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(5,10,22,.42),rgba(5,10,22,0));
  filter:blur(8px);
  pointer-events:none;
}
.notif.show{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0);}
.notif.hide{opacity:0;transform:translate(-50%,-50%) scale(.95) translateY(-6px);}
.notif.corner{
  left:24px;
  right:auto;
  top:auto;
  bottom:24px;
  width:min(460px,calc(100vw - 48px));
  transform:translateY(16px) scale(.94);
  transform-origin:bottom left;
}
.notif.corner.show{transform:translateY(0) scale(1);}
.notif.corner.hide{transform:translateY(10px) scale(.97);}
.notif.corner .notif-inner{padding:18px;}
.notif.corner .notif-head{margin-bottom:12px;}
.notif.corner .notif-board-shell{padding:12px;border-radius:20px;transform:none;opacity:1;}
.notif.corner .mini-bingo{width:min(100%,248px);gap:4px;}
.notif.corner .notif-task-wrap{margin-top:12px;padding:14px 16px 13px;border-radius:18px;}
.notif.corner .notif-task{font-size:24px;line-height:1.18;-webkit-line-clamp:3;}
.notif.corner .notif-kicker{margin-bottom:8px;font-size:11px;}
.notif.corner .notif-meta{margin-top:10px;font-size:12px;}
.notif.corner .notif-chip{min-width:88px;padding:8px 12px;font-size:12px;}

.progress-track{height:3px;background:rgba(79,168,255,.08)}
.progress-bar{
  height:3px;
  background:linear-gradient(90deg,#4fa8ff 0%,#8dd2ff 45%,#10b37d 100%);
  width:100%;
  transform-origin:left;
}
.progress-bar.running{animation:drain 5s linear forwards}
@keyframes drain{from{transform:scaleX(1)}to{transform:scaleX(0)}}

.notif-inner{position:relative;padding:22px}
.notif-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}
.notif-label{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'Nunito',sans-serif;
  font-size:13px;
  font-weight:900;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:rgba(200,224,255,.9);
}
.notif-label::before{
  content:'';
  width:8px;
  height:8px;
  border-radius:50%;
  background:#4fa8ff;
  box-shadow:0 0 10px rgba(79,168,255,.85);
  animation:blink 1s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.notif-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:96px;
  padding:9px 14px;
  border-radius:999px;
  background:rgba(79,168,255,.08);
  border:1px solid rgba(79,168,255,.18);
  font-family:'Nunito',sans-serif;
  font-size:13px;
  font-weight:800;
  color:#c8e0ff;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.notif-content{display:block}

.notif-board-shell{
  position:relative;
  padding:16px;
  border-radius:24px;
  background:linear-gradient(180deg,rgba(12,18,44,.96),rgba(9,15,34,.94));
  border:1px solid rgba(79,168,255,.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 14px 34px rgba(0,0,0,.22);
  transform:perspective(600px) rotateX(16deg) scale(.92);
  opacity:0;
}
.notif-board-shell::before{
  content:'';
  position:absolute;
  inset:1px;
  border-radius:20px;
  background:radial-gradient(circle at top,rgba(79,168,255,.07),transparent 42%);
  pointer-events:none;
}
.notif.show .notif-board-shell{
  animation:boardLift .46s cubic-bezier(.2,.84,.18,1) forwards;
}
@keyframes boardLift{
  0%{opacity:0;transform:perspective(600px) rotateX(16deg) scale(.9) translateY(16px);}
  100%{opacity:1;transform:perspective(600px) rotateX(0deg) scale(1) translateY(0);}
}

.mini-bingo{
  position:relative;
  z-index:1;
  width:min(100%,286px);
  aspect-ratio:1/1;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:5px;
}

.mini-cell{
  position:relative;
  aspect-ratio:1/1;
  background:rgba(14,18,40,.96);
  border:1px solid rgba(79,168,255,.12);
  border-radius:10px;
  overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
}
.mini-cell.mini-free{
  background:rgba(245,200,66,.08);
  border-color:rgba(245,200,66,.34);
}
.mini-cell.mini-crossed{
  background:rgba(79,168,255,.08);
  border-color:rgba(79,168,255,.3);
}
.mini-cell.mini-bingo-line{
  background:linear-gradient(180deg,rgba(245,200,66,.1),rgba(79,168,255,.08));
  border-color:rgba(245,200,66,.52);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03),
    0 0 0 1px rgba(245,200,66,.08);
}
.mini-cell.mini-just-crossed{
  border-color:rgba(79,168,255,.9);
  background:rgba(79,168,255,.18);
  box-shadow:
    0 0 0 1px rgba(79,168,255,.22),
    0 0 22px rgba(79,168,255,.18);
}
.mini-cell.mini-just-crossed::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  border:1px solid rgba(141,210,255,.8);
  opacity:0;
  transform:scale(.7);
}
.notif.show .mini-cell.mini-just-crossed::before{
  animation:miniCellPulse .62s ease-out forwards;
}
@keyframes miniCellPulse{
  0%{opacity:1;transform:scale(.72);}
  70%{opacity:.55;transform:scale(1.08);}
  100%{opacity:0;transform:scale(1.18);}
}

.mini-cross{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.mini-cross line{
  stroke:rgba(79,168,255,.9);
  stroke-width:5;
  stroke-linecap:round;
  stroke-dasharray:160;
  stroke-dashoffset:160;
}
.mini-cell.mini-bingo-line .mini-cross line{
  stroke:rgba(245,200,66,.92);
}
.mini-cell.mini-crossed:not(.mini-just-crossed) .mini-cross line,
.mini-cell.mini-bingo-line:not(.mini-just-crossed) .mini-cross line{
  stroke-dashoffset:0;
}
.notif.show .mini-cell.mini-just-crossed .mini-cross .ml1{
  animation:miniCrossDraw .26s ease-out forwards;
  animation-delay:90ms;
}
.notif.show .mini-cell.mini-just-crossed .mini-cross .ml2{
  animation:miniCrossDraw .26s ease-out forwards;
  animation-delay:210ms;
}
@keyframes miniCrossDraw{
  from{stroke-dashoffset:160;}
  to{stroke-dashoffset:0;}
}

.notif-task-wrap{
  position:relative;
  z-index:1;
  margin-top:16px;
  padding:18px 20px 16px;
  border-radius:22px;
  background:linear-gradient(180deg,rgba(7,12,28,.96),rgba(8,13,30,.9));
  border:1px solid rgba(141,210,255,.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 34px rgba(0,0,0,.18);
  overflow:hidden;
}
.notif-task-wrap::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(141,210,255,.12),transparent 58%);
  pointer-events:none;
}
.notif-kicker{
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  font-family:'Nunito',sans-serif;
  font-size:12px;
  font-weight:900;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:rgba(200,224,255,.72);
}
.notif-kicker::before{
  content:'';
  width:7px;
  height:7px;
  border-radius:50%;
  background:#10b37d;
  box-shadow:0 0 10px rgba(16,179,125,.65);
}
.notif-task{
  position:relative;
  z-index:1;
  font-family:'Nunito',sans-serif;
  font-size:30px;
  line-height:1.14;
  font-weight:900;
  color:#eef8ff;
  text-align:center;
  text-shadow:0 0 16px rgba(79,168,255,.12);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
}
.notif-meta{
  position:relative;
  z-index:1;
  margin-top:12px;
  text-align:center;
  font-family:'Nunito',sans-serif;
  font-size:13px;
  font-weight:800;
  letter-spacing:.35px;
  color:rgba(200,224,255,.64);
}
.notif-meta b{color:#c8e0ff;font-weight:900}
.notif.show .notif-task-wrap{
  animation:taskReveal .42s cubic-bezier(.2,.84,.18,1) forwards;
}
@keyframes taskReveal{
  0%{opacity:0;transform:translateY(10px) scale(.98);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}

#bingo-backdrop{
  position:fixed;
  inset:0;
  opacity:0;
  pointer-events:none;
  z-index:9996;
  background:radial-gradient(circle at center,rgba(4,9,24,.18) 0%,rgba(4,9,24,.62) 42%,rgba(4,9,24,.82) 100%);
  backdrop-filter:blur(12px) saturate(1.05);
  -webkit-backdrop-filter:blur(12px) saturate(1.05);
  transition:opacity .28s ease;
}
#bingo-backdrop.show{opacity:1;}

/* ===== BINGO BANNER — PARACHUTE DROP ===== */
/* ===== BINGO BANNER — CLEAN DROP ===== */
.bingo-banner{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(980px,88vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
  z-index:9999;
}
.bingo-banner.show{opacity:1;}
.bingo-banner.hide{opacity:0;transition:opacity .45s ease;}
.bingo-banner::before,
.bingo-banner::after{content:none;}
.bingo-panel{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  width:min(760px,86vw);
  padding:34px 36px 30px;
  border-radius:36px;
  background:linear-gradient(180deg,rgba(8,14,32,.92),rgba(6,10,24,.84));
  border:1px solid rgba(141,210,255,.18);
  box-shadow:0 28px 90px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.06), 0 0 80px rgba(var(--accent-rgb),.12);
  overflow:hidden;
}
.bingo-panel::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(141,210,255,.12),transparent 52%);
  pointer-events:none;
}
.bingo-panel::after{
  content:'';
  position:absolute;
  inset:14px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.04);
  pointer-events:none;
}
.bingo-badge{
  position:relative;
  z-index:2;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(16,179,125,.12);
  border:1px solid rgba(16,179,125,.22);
  color:#dffdf3;
  font-family:var(--bingo-font);
  font-size:14px;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
}

#bingo-flash{
  position:fixed;
  inset:0;
  opacity:0;
  pointer-events:none;
  z-index:9998;
  background:
    radial-gradient(circle at center,
      rgba(255,255,255,.16) 0%,
      rgba(var(--accent-rgb),.38) 22%,
      rgba(var(--accent-rgb),.18) 48%,
      transparent 72%);
}
#bingo-flash.flash-in{animation:bingoFlashIn .12s ease-out forwards;}
#bingo-flash.flash-out{animation:bingoFlashOut .42s ease-out forwards;}
@keyframes bingoFlashIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes bingoFlashOut{
  from{opacity:1;}
  to{opacity:0;}
}

.drop-stage{
  position:relative;
  width:clamp(260px,24vw,360px);
  height:clamp(260px,24vw,360px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.drop-wrap{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  transform:translateY(-125vh) scale(.62) rotate(-10deg);
  transform-origin:center top;
  filter:
    drop-shadow(0 20px 36px rgba(0,0,0,.45))
    drop-shadow(0 0 22px rgba(var(--accent-rgb),.28))
    drop-shadow(0 0 72px rgba(var(--accent-rgb),.18));
}
.drop-wrap.drop-enter{
  animation:dropFall 1.9s cubic-bezier(.2,.72,.18,1) forwards;
}
.drop-wrap.drop-idle{
  animation:dropIdle 3.3s ease-in-out infinite;
}
@keyframes dropFall{
  0%{transform:translateY(-125vh) scale(.62) rotate(-10deg);}
  18%{transform:translateY(-78vh) scale(.72) rotate(8deg);}
  38%{transform:translateY(-34vh) scale(.84) rotate(-6deg);}
  60%{transform:translateY(-6vh) scale(.96) rotate(4deg);}
  74%{transform:translateY(6px) scale(1.05,.9) rotate(-2deg);}
  84%{transform:translateY(-18px) scale(.99,1.04) rotate(1deg);}
  100%{transform:translateY(0) scale(1) rotate(0);}
}
@keyframes dropIdle{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-10px) rotate(1deg);}
}

.drop-icon{
  width:100%;
  height:100%;
  display:block;
  transform-origin:center center;
}
.drop-wrap.drop-idle .drop-icon{
  animation:canopyPulse 2.7s ease-in-out infinite;
}
@keyframes canopyPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.025,.985);}
}

.drop-icon path,
.drop-icon line,
.drop-icon rect{
  fill:none;
  stroke:#fff;
  stroke-width:6;
  stroke-linecap:round;
  stroke-linejoin:round;
  vector-effect:non-scaling-stroke;
}

.impact-ring{
  position:absolute;
  left:50%;
  bottom:44px;
  width:154px;
  height:154px;
  transform:translateX(-50%) scale(.3);
  border-radius:50%;
  border:3px solid rgba(var(--accent-rgb),0);
  opacity:0;
  z-index:1;
}
.impact-ring.boom{animation:impactRing .62s ease-out forwards;}
@keyframes impactRing{
  0%{
    opacity:.9;
    border-color:rgba(var(--accent-rgb),.85);
    transform:translateX(-50%) scale(.3);
  }
  100%{
    opacity:0;
    border-color:rgba(var(--accent-rgb),0);
    transform:translateX(-50%) scale(1.45);
  }
}

.dust{
  position:absolute;
  left:50%;
  bottom:44px;
  width:220px;
  height:56px;
  transform:translateX(-50%) scale(.2);
  opacity:0;
  pointer-events:none;
  filter:blur(2px);
  z-index:0;
}
.dust::before,
.dust::after{
  content:'';
  position:absolute;
  inset:auto;
  border-radius:999px;
  background:radial-gradient(ellipse at center,
    rgba(var(--accent-rgb),.75) 0%,
    rgba(var(--accent-rgb),.34) 45%,
    transparent 74%);
}
.dust::before{
  left:0;
  right:0;
  top:14px;
  margin:auto;
  width:180px;
  height:26px;
}
.dust::after{
  left:26px;
  top:4px;
  width:124px;
  height:22px;
}
.dust.puff{animation:dustPuff .58s ease-out forwards;}
@keyframes dustPuff{
  0%{
    opacity:.85;
    transform:translateX(-50%) scale(.25);
  }
  60%{
    opacity:.45;
    transform:translateX(-50%) scale(1.08,1.25);
  }
  100%{
    opacity:0;
    transform:translateX(-50%) scale(1.55,.6) translateY(8px);
  }
}

.bingo-word{
  font-family:var(--bingo-font);
  font-size:clamp(92px,9vw,156px);
  line-height:.95;
  letter-spacing:.04em;
  color:#f3fffb;
  opacity:0;
  transform:translateY(22px) scale(.82);
  text-shadow:
    0 0 18px rgba(var(--accent-rgb),.32),
    0 0 42px rgba(var(--accent-rgb),.22);
}

.bingo-sub{
  font-family:var(--bingo-font);
  font-size:clamp(24px,2.2vw,34px);
  font-weight:800;
  line-height:1.12;
  letter-spacing:.04em;
  color:#ecfff8;
  opacity:0;
  transform:translateY(16px);
  text-shadow:
    0 0 16px rgba(var(--accent-rgb),.34),
    0 0 42px rgba(var(--accent-rgb),.18);
}

.bingo-banner.settled .bingo-word{
  animation:
    bingoWordBurst .62s cubic-bezier(.16,.92,.24,1.22) forwards,
    bingoWordPulse .44s ease-out .08s 1 forwards,
    bingoWordGlow 1.6s ease-in-out .74s infinite alternate;
}
.bingo-banner.settled .bingo-sub{
  animation:bingoSubBurst .42s cubic-bezier(.18,.82,.24,1.1) .06s forwards;
}

@keyframes bingoWordBurst{
  0%{
    opacity:0;
    transform:translateY(18px) scale(.18);
  }
  38%{
    opacity:1;
    transform:translateY(-6px) scale(1.26);
  }
  62%{
    opacity:1;
    transform:translateY(2px) scale(.88);
  }
  78%{
    opacity:1;
    transform:translateY(-1px) scale(1.08);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}
@keyframes bingoWordPulse{
  0%{
    text-shadow:
      0 0 22px rgba(var(--accent-rgb),.28),
      0 14px 36px rgba(0,0,0,.38),
      0 2px 0 rgba(0,0,0,.62),
      2px 0 0 rgba(0,0,0,.62),
      0 -2px 0 rgba(0,0,0,.62),
      -2px 0 0 rgba(0,0,0,.62),
      1.5px 1.5px 0 rgba(0,0,0,.48),
      -1.5px 1.5px 0 rgba(0,0,0,.48),

/* ===== CONFETTI SYSTEM ===== */
.cf{
  position:fixed;
  pointer-events:none;
  z-index:9997;
  border-radius:2px;
}
.cf.circle{border-radius:50%;}
.cf.star{
  background:transparent !important;
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}
@keyframes cfExplode{
  0%  {opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  20% {opacity:1}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--tr)) scale(var(--ts))}
}
@keyframes cfFall{
  0%  {opacity:1;transform:translate(0,0) rotate(0deg)}
  15% {opacity:1;transform:translate(var(--sx),calc(var(--ty)*0.1)) rotate(calc(var(--tr)*0.2))}
  100%{opacity:0;transform:translate(var(--fx),var(--ty)) rotate(var(--tr)) scale(0.6)}
}

@media (max-width:900px){
  .notif{width:min(520px,94vw);}
  .notif-task{font-size:26px;}
  .notif.corner{width:min(430px,calc(100vw - 32px));left:16px;bottom:16px;}
  .notif.corner .notif-task{font-size:22px;}
  .bingo-panel{padding:28px 24px 24px;border-radius:28px;width:min(92vw,680px);}
  .bingo-badge{font-size:12px;letter-spacing:.14em;}
  .drop-stage{width:clamp(220px,34vw,300px);height:clamp(220px,34vw,300px);}
}

@media (max-width:640px){
  .notif-inner{padding:18px;}
  .notif-task-wrap{padding:16px 16px 14px;}
  .notif-task{font-size:22px;line-height:1.16;}
  .notif-label{font-size:12px;letter-spacing:1.3px;}
  .notif-chip{min-width:78px;padding:7px 10px;font-size:12px;}
  .bingo-word{font-size:clamp(70px,16vw,110px);}
  .bingo-sub{font-size:clamp(18px,4.8vw,24px);}
}

.bar{display:none !important;}
.bingo-badge{display:none !important;}

#bingo-backdrop{
  background:rgba(8,14,30,.08) !important;
  backdrop-filter:blur(3px) saturate(1.02) !important;
  -webkit-backdrop-filter:blur(3px) saturate(1.02) !important;
  opacity:0;
  transition:opacity .24s ease;
}
#bingo-backdrop::before{
  content:none !important;
}
.notif.corner{
  z-index:9998 !important;
}

.bingo-banner{
  width:min(1080px,92vw) !important;
  gap:12px !important;
}

  position:relative !important;

  padding:16px 16px 8px !important;
  border:none !important;
  border-radius:0 !important;
  background:none !important;
  box-shadow:none !important;
  overflow:visible !important;
}
.bingo-panel::before,
.bingo-panel::after{
  content:none !important;
  border:none !important;
  pointer-events:none;
}
.drop-stage{
  width:clamp(230px,22vw,320px) !important;
  height:clamp(230px,22vw,320px) !important;
  margin-bottom:8px;
}

    drop-shadow(0 18px 34px rgba(0,0,0,.42))

  line-height:.9 !important;
  letter-spacing:.06em !important;
  color:#f7fffd !important;

    0 0 12px rgba(var(--accent-rgb),.20),

.bingo-sub{

/* ===== final pseudo blur for OBS ===== */
#bingo-backdrop{
  background:
    linear-gradient(180deg,rgba(5,10,22,.16) 0%,rgba(5,10,22,.26) 100%),
    radial-gradient(circle at 50% 46%,rgba(236,255,250,.08) 0%,rgba(140,220,255,.07) 12%,rgba(16,179,125,.06) 24%,rgba(8,14,30,.24) 52%,rgba(4,8,18,.42) 100%) !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
  opacity:0;
  transition:opacity .22s ease !important;
}
#bingo-backdrop::before{
  content:'' !important;
  position:absolute;
  inset:-6%;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 46%,rgba(255,255,255,.10) 0%,rgba(255,255,255,.045) 10%,rgba(79,168,255,.06) 18%,rgba(16,179,125,.065) 26%,transparent 40%),
    radial-gradient(circle at 14% 24%,rgba(255,255,255,.045) 0%,transparent 18%),
    radial-gradient(circle at 82% 22%,rgba(79,168,255,.04) 0%,transparent 16%),
    radial-gradient(circle at 50% 82%,rgba(16,179,125,.03) 0%,transparent 22%);
  filter:blur(28px);
  opacity:.9;
  transform:scale(1.04);
}
#bingo-backdrop::after{
  content:'' !important;
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(180deg,rgba(255,255,255,.018),rgba(255,255,255,0) 24%),
    radial-gradient(circle at 50% 46%,rgba(255,255,255,.04) 0%,transparent 34%);
  mix-blend-mode:screen;
  opacity:.52;
}

.notif.corner{

}

  z-index:10001 !important;
}

    -1.5px -1.5px 0 rgba(0,0,0,.48) !important;

/* ===== bingo outro ===== */
.bingo-word.text-exit,
.bingo-sub.text-exit{
  animation:bingoTextOut .34s cubic-bezier(.22,.7,.2,1) forwards !important;
}
@keyframes bingoTextOut{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-18px) scale(.96);}
}
.drop-wrap.drop-exit{
  animation:dropExitDown 1.9s cubic-bezier(.2,.72,.18,1) forwards !important;
}
@keyframes dropExitDown{
  0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1;}
  16%{transform:translateY(18px) scale(1.05,.9) rotate(-2deg);opacity:1;}
  28%{transform:translateY(-10px) scale(.99,1.04) rotate(1deg);opacity:1;}
  42%{transform:translateY(10vh) scale(.96) rotate(4deg);opacity:1;}
  62%{transform:translateY(42vh) scale(.84) rotate(-6deg);opacity:1;}
  82%{transform:translateY(86vh) scale(.72) rotate(8deg);opacity:1;}
  100%{transform:translateY(145vh) scale(.62) rotate(-10deg);opacity:1;}
}

<script>
const ROOM=(new URL(location.href)).searchParams.get("room")||"magicgt";
let db=null, roomRef=null, remoteReady=false;
try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.database();
  roomRef=db.ref("rooms/"+ROOM);
  remoteReady=true;
}catch(e){
  console.error(e);
}

const KEY='maloycs_bingo_v5';
const FREE=12;
const FREE_TEXT='ПУСТО';
const DURATION=5000;
const BASE_W=1920;
const BASE_H=1080;

let lastTs=0,notifTimer=null,bingoTimer=null,doneBingos=new Set();
let bingoActive=false;
let suppressInitialRemoteState=true;
let lastRaw='';

function updateScale(){
  const scale=Math.max(0.82,Math.min(window.innerWidth/BASE_W,window.innerHeight/BASE_H));
  document.documentElement.style.setProperty('--ui-scale',scale.toFixed(4));
}

function normalizeOverlayState(raw){
  const texts=raw&&Array.isArray(raw.texts)&&raw.texts.length===25?[...raw.texts]:new Array(25).fill('');
  texts[FREE]=FREE_TEXT;
  const crossed=raw&&Array.isArray(raw.crossed)&&raw.crossed.length===25?[...raw.crossed]:new Array(25).fill(false);
  crossed[FREE]=false;
  return{...raw,texts,crossed};
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(KEY));
    if(s&&s.texts&&s.texts.length===25)return normalizeOverlayState(s);
  }catch(e){}
  return normalizeOverlayState({
    texts:[],
    crossed:new Array(25).fill(false),
    lastIdx:null,
    lastText:null,
    newBingo:false,
    lastAction:null,
    ts:0
  });
}

function ic(crossed,i){
  return i===FREE||crossed[i];
}

function LINES(){
  const L=[];
  for(let r=0;r<5;r++)L.push([r*5,r*5+1,r*5+2,r*5+3,r*5+4]);
  for(let c=0;c<5;c++)L.push([c,c+5,c+10,c+15,c+20]);
  L.push([0,6,12,18,24]);
  L.push([4,8,12,16,20]);
  return L;
}

function updateStats(s){
  const cr=s.crossed.filter((_,i)=>i!==FREE&&s.crossed[i]).length;
  doneBingos=new Set();
  LINES().forEach(line=>{
    if(line.every(i=>ic(s.crossed,i)))doneBingos.add(line.join(','));
  });
  document.getElementById('sc').textContent=cr;
  document.getElementById('bc').textContent=doneBingos.size;
  document.getElementById('rc').textContent=24-cr;
}

let audioCtx=null;
function primeAudio(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    if(!audioCtx)audioCtx=new Ctx();
    if(audioCtx.state==='suspended')audioCtx.resume();
  }catch(e){}
}
window.addEventListener('pointerdown',primeAudio,{passive:true});
window.addEventListener('keydown',primeAudio);
window.addEventListener('load',()=>setTimeout(primeAudio,120));

function playNotifSound(){
  try{
    primeAudio();
    if(!audioCtx)return;

    const now=audioCtx.currentTime;
    [659,880,740].forEach((freq,i)=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();

      osc.type='sine';
      osc.frequency.setValueAtTime(freq,now+i*0.09);

      gain.gain.setValueAtTime(0.0001,now+i*0.09);
      gain.gain.exponentialRampToValueAtTime(0.07,now+i*0.09+0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001,now+i*0.09+0.18);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now+i*0.09);
      osc.stop(now+i*0.09+0.17);
    });
  }catch(e){}
}

function playBingoWinSound(){
  try{
    primeAudio();
    if(!audioCtx)return;

    const now=audioCtx.currentTime+0.01;

    const hit=audioCtx.createOscillator();
    const hitGain=audioCtx.createGain();
    hit.type='triangle';
    hit.frequency.setValueAtTime(180,now);
    hit.frequency.exponentialRampToValueAtTime(70,now+0.18);
    hitGain.gain.setValueAtTime(0.0001,now);
    hitGain.gain.exponentialRampToValueAtTime(0.16,now+0.01);
    hitGain.gain.exponentialRampToValueAtTime(0.0001,now+0.2);
    hit.connect(hitGain);
    hitGain.connect(audioCtx.destination);
    hit.start(now);
    hit.stop(now+0.22);

    const melody=[523.25,659.25,783.99,1046.5];
    melody.forEach((freq,i)=>{
      const t=now+0.05+i*0.1;

      ['square','triangle'].forEach((type,j)=>{
        const osc=audioCtx.createOscillator();
        const gain=audioCtx.createGain();

        osc.type=type;
        osc.frequency.setValueAtTime(freq,t);

        const vol=j===0?0.045:0.07;
        gain.gain.setValueAtTime(0.0001,t);
        gain.gain.exponentialRampToValueAtTime(vol,t+0.015);
        gain.gain.exponentialRampToValueAtTime(vol*0.55,t+0.11);
        gain.gain.exponentialRampToValueAtTime(0.0001,t+0.26);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t+0.28);
      });
    });

    [523.25,659.25,783.99,1046.5].forEach((freq,i)=>{
      const t=now+0.48;

      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();

      osc.type=i===3?'triangle':'sine';
      osc.frequency.setValueAtTime(freq,t);

      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.08,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+0.55);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t);
      osc.stop(t+0.6);
    });
  }catch(e){}
}


function buildMiniBingoGrid(crossed, lastIdx, bingoLines, lastAction='cross'){
  const grid=document.getElementById('mini-bingo-grid');
  if(!grid)return;
  grid.innerHTML='';

  const bingoSet=new Set();
  bingoLines.forEach(line=>line.forEach(i=>bingoSet.add(i)));

  for(let i=0;i<25;i++){
    const cell=document.createElement('div');
    const isFree=(i===FREE);
    const isCrossed=!!crossed[i]||isFree;
    const isJustCrossed=(lastAction==='cross'&&i===lastIdx);
    const isOnBingoLine=bingoSet.has(i);

    let cls='mini-cell';
    if(isFree) cls+=' mini-free';
    if(isCrossed) cls+=' mini-crossed';
    if(isOnBingoLine) cls+=' mini-bingo-line';
    if(isJustCrossed) cls+=' mini-just-crossed';

    cell.className=cls;

    if(isCrossed||isJustCrossed){
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('class','mini-cross');
      svg.setAttribute('viewBox','0 0 100 100');
      svg.setAttribute('preserveAspectRatio','none');
      svg.innerHTML='<line class="ml1" x1="12" y1="12" x2="88" y2="88"/><line class="ml2" x1="88" y1="12" x2="12" y2="88"/>';
      cell.appendChild(svg);
    }

    grid.appendChild(cell);
  }
}

function getCompletedBingoLines(crossed){
  const lines=LINES();
  return lines.filter(line=>line.every(i=>ic(crossed,i)));
}

function getCrossedCount(crossed){
  return crossed.filter((v,i)=>i!==FREE&&v).length;
}

function showNotif(text,{isBingo=false,bingoCount=0,state=null,action='cross'}={}){
  const notif=document.getElementById('notif');
  const pbar=document.getElementById('pbar');
  const displayDuration=isBingo ? Math.max(DURATION,6200) : DURATION;

  notif.classList.remove('show','hide','corner');
  pbar.classList.remove('running');

  if(state){
    const completedLines=getCompletedBingoLines(state.crossed);
    const crossedCount=getCrossedCount(state.crossed);
    buildMiniBingoGrid(state.crossed, state.lastIdx, completedLines, action);

    const chip=document.getElementById('nchip');
    const label=document.getElementById('nlabel');
    const kicker=document.getElementById('nkicker');
    const task=document.getElementById('ntask');
    const meta=document.getElementById('nmeta');
    if(chip) chip.textContent=`${crossedCount}/24`;
    if(label) label.textContent=action==='uncross' ? 'Позиция аннулирована' : 'Позиция засчитана';
    if(kicker) kicker.textContent=action==='uncross' ? 'Модератор аннулировал пункт' : 'Модератор отметил пункт';
    if(task){
      const fallback=action==='uncross' ? 'Модератор аннулировал пункт' : 'Пункт бинго отмечен';
      task.textContent=text || fallback;
      task.title=text || fallback;
    }
    if(meta){
      const lineCount=completedLines.length;
      meta.innerHTML=lineCount>0
        ? `Зачёркнуто: <b>${crossedCount}</b>/24 · Бинго линий: <b>${lineCount}</b>`
        : `Зачёркнуто: <b>${crossedCount}</b>/24`;
    }
  }

  if(isBingo){
    notif.classList.add('corner');
    showBingo(bingoCount);
  }

  void notif.offsetWidth;
  notif.classList.add('show');

  void pbar.offsetWidth;
  pbar.style.animationDuration=`${displayDuration}ms`;
  pbar.classList.add('running');

  playNotifSound();

  if(notifTimer)clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>{
    notif.classList.remove('show');
    notif.classList.add('hide');
    setTimeout(()=>{
      notif.classList.remove('hide','corner');
      pbar.style.animationDuration='';
    },420);
  },displayDuration);
}

function showBingo(count){
  const flash=document.getElementById('bingo-flash');
  const backdrop=document.getElementById('bingo-backdrop');
  const bb=document.getElementById('bbanner');
  const dw=document.getElementById('drop-wrap');
  const dust=document.getElementById('dust');
  const word=document.getElementById('bingo-word');
  const sub=document.getElementById('bingo-sub');

  bingoActive=true;
  word.textContent='БИНГО!';
  sub.textContent='+ дроп';

  playBingoWinSound();

  flash.className='';
  if(backdrop)backdrop.classList.remove('show');
  bb.classList.remove('show','hide','settled');
  dw.classList.remove('drop-enter','drop-idle','drop-exit');
  dust.classList.remove('puff');
  word.classList.remove('text-exit');
  sub.classList.remove('text-exit');
  bb.setAttribute('aria-hidden','false');

  void bb.offsetWidth;

  if(backdrop)backdrop.classList.add('show');
  flash.classList.add('flash-in');
  flash.addEventListener('animationend',()=>{
    flash.classList.remove('flash-in');
    flash.classList.add('flash-out');
    flash.addEventListener('animationend',()=>{flash.className='';},{once:true});
  },{once:true});

  bb.classList.add('show');
  dw.classList.add('drop-enter');

  setTimeout(()=>{
    void dust.offsetWidth;
    dust.classList.add('puff');
  },1380);

  setTimeout(()=>{
    bb.classList.add('settled');
    spawnConfetti();
  },1640);

  setTimeout(()=>{
    dw.classList.remove('drop-enter');
    dw.classList.add('drop-idle');
  },1900);

  if(bingoTimer)clearTimeout(bingoTimer);
  bingoTimer=setTimeout(()=>{
    bb.classList.remove('settled');
    word.classList.add('text-exit');
    sub.classList.add('text-exit');

    setTimeout(()=>{
      dw.classList.remove('drop-idle');
      dw.classList.add('drop-exit');
      if(backdrop)backdrop.classList.remove('show');
    },340);

    setTimeout(()=>{
      bb.classList.remove('show');
      bb.classList.add('hide');
      bingoActive=false;

      setTimeout(()=>{
        bb.classList.remove('hide');
        dw.classList.remove('drop-enter','drop-idle','drop-exit');
        dust.classList.remove('puff');
        word.classList.remove('text-exit');
        sub.classList.remove('text-exit');
        bb.setAttribute('aria-hidden','true');
      },520);
    },1180);
  },6200);
}

function spawnConfetti(){
  const cols=[
    '#10b37d',
    '#7cf0ca',
    '#d9fff4',
    '#4fa8ff',
    '#60a5fa',
    '#ffffff',
    '#0b7d58',
    '#97f7d8'
  ];

  const cx=window.innerWidth/2;
  const cy=window.innerHeight/2;
  const total=64;

  for(let i=0;i<total;i++){
    setTimeout(()=>{
      const d=document.createElement('div');
      const angle=Math.random()*Math.PI*2;
      const dist=110+Math.random()*460;
      const tx=Math.cos(angle)*dist;
      const ty=Math.sin(angle)*dist + (60+Math.random()*320);
      const size=6+Math.random()*14;
      const col=cols[Math.floor(Math.random()*cols.length)];
      const dur=0.85+Math.random()*0.9;
      const rot=(Math.random()-0.5)*960;
      const scale=0.45+Math.random()*0.5;
      const shapeRoll=Math.random();

      let cls='cf';
      if(shapeRoll<0.33) cls+=' circle';
      else if(shapeRoll<0.5) cls+=' star';

      d.className=cls;
      d.style.cssText=`
        left:${cx + (Math.random()-0.5)*90}px;
        top:${cy + (Math.random()-0.5)*60}px;
        width:${size}px;
        height:${size}px;
        background:${col};
        box-shadow:0 0 10px rgba(16,179,125,.18);
        --tx:${tx}px;
        --ty:${ty}px;
        --tr:${rot}deg;
        --ts:${scale};
        --sx:${(Math.random()-0.5)*60}px;
        --fx:${tx + (Math.random()-0.5)*70}px;
        animation:cfExplode ${dur}s cubic-bezier(.25,.46,.45,.94) forwards;
      `;

      document.body.appendChild(d);
      d.addEventListener('animationend',()=>d.remove(),{once:true});
    },Math.random()*260);
  }
}

function handle(s,{silent=false}={}){
  s=normalizeOverlayState(s);
  updateStats(s);

  if(silent){
    if(s.ts)lastTs=s.ts;
    return;
  }

  if(s.ts&&s.ts!==lastTs&&s.lastIdx!==null&&s.lastText){
    lastTs=s.ts;
    const action=s.lastAction||(s.crossed[s.lastIdx]?'cross':'uncross');
    showNotif(s.lastText,{isBingo:action==='cross'&&!!s.newBingo,bingoCount:doneBingos.size,state:s,action});
  }else if(s.ts){
    lastTs=s.ts;
  }
}

try{
  const ch=new BroadcastChannel('maloycs_bingo');
  ch.onmessage=e=>{
    if(e.data.type==='update')handle(e.data);
  };
}catch(e){}

window.addEventListener('storage',e=>{
  if(e.key===KEY&&e.newValue){
    lastRaw=e.newValue;
    try{
      handle(JSON.parse(e.newValue));
    }catch(err){}
  }
});

function poll(){
  const raw=localStorage.getItem(KEY)||'';
  if(raw!==lastRaw){
    lastRaw=raw;
    try{
      handle(JSON.parse(raw));
    }catch(e){}
  }
}
setInterval(poll,300);

function bindRemote(){
  if(!(remoteReady&&roomRef))return;

  roomRef.on("value",snap=>{
    const data=snap.val();
    if(!data||!data.texts||data.texts.length!==25)return;

    lastRaw=JSON.stringify(data);
    try{
      localStorage.setItem(KEY,lastRaw);
    }catch(e){}

    handle(data,{silent:suppressInitialRemoteState});
    suppressInitialRemoteState=false;
  });
}

window.addEventListener('resize',updateScale);
updateScale();

lastRaw=localStorage.getItem(KEY)||'';
const init=load();
updateStats(init);
lastTs=init.ts||0;

bindRemote();
</script>
